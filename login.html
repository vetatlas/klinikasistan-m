<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap - VetAsistan</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Firebase kütüphaneleri - ÖNCE bunlar yüklenmeli -->
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
      <!-- Geri Butonu -->
      <a href="index.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-white mb-8">
        <i class="fas fa-arrow-left"></i>
        <span>Geri</span>
      </a>

      <div class="text-center mb-10">
        <div class="inline-flex w-20 h-20 bg-cyan-500/10 rounded-3xl items-center justify-center mb-6">
          <i class="fas fa-paw text-5xl text-cyan-400"></i>
        </div>
        <h1 class="text-4xl font-bold">Hoş Geldin</h1>
        <p class="text-slate-400 mt-2">VetAsistan'a giriş yap</p>
      </div>

      <div class="bg-slate-900/70 border border-slate-700 rounded-3xl p-8">
        <div class="space-y-6">
          <div>
            <label class="block text-sm text-slate-400 mb-2">E-posta</label>
            <input type="email" id="email" 
                   class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none text-lg"
                   placeholder="ornek@email.com">
          </div>

          <div>
            <label class="block text-sm text-slate-400 mb-2">Şifre</label>
            <input type="password" id="password" 
                   class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none text-lg"
                   placeholder="••••••••">
          </div>

          <button onclick="login()" 
                  class="w-full bg-gradient-to-r from-cyan-400 to-teal-400 text-slate-950 font-semibold py-4 rounded-2xl text-lg hover:scale-105 transition-all">
            Giriş Yap
          </button>

          <button onclick="register()" 
                  class="w-full border border-slate-600 hover:border-slate-400 py-4 rounded-2xl text-lg transition">
            Hesap Oluştur
          </button>
        </div>

        <p id="message" class="text-center mt-6 text-red-400 text-sm min-h-[24px]"></p>
      </div>

      <p class="text-center text-xs text-slate-500 mt-10">
        Sadece senin için tasarlandı • Gaziantep Veteriner
      </p>
    </div>
  </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
